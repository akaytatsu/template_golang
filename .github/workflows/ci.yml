name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: ./src/go.sum

      - name: Install tools
        run: |
          go install mvdan.cc/gofumpt@v0.10.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Format check
        run: gofumpt -d .

      - name: Lint
        run: golangci-lint run --config=.golangci.yml --timeout=5m

      - name: Mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: ./src/go.sum

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./src/coverage.out

  security:
    name: Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: ./src/go.sum

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          govulncheck ./...

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: ./src
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f src/Dockerfile -t app:${{ github.sha }} src/

      - name: Trivy scan image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          scan-ref: app:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0
